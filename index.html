<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Lagos</title>

  <!-- Glide CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <!-- Lightbox CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">

  <style>
    :root {
      --primary: #0d3b66;
      --accent: #f4a261;
      --light: #f8f9fa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--light);
      color: #333;
      line-height: 1.6;
    }

    header {
      background: var(--primary);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
    }

    header h1 {
      margin-bottom: 0.5rem;
    }

    section {
      padding: 3rem 1rem;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--primary);
    }

    /* Slider */
    .glide img {
      width: 100%;
      height: 70vh;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Chart */
    canvas {
      max-width: 700px;
      margin: auto;
      display: block;
    }

    /* Map */
    #map {
      height: 450px;
      border-radius: 10px;
      margin-top: 1rem;
    }

    footer {
      background: var(--primary);
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 3rem;
    }

    @media (min-width: 768px) {
      .glide img {
        height: 85vh;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Escape Lagos 🌴</h1>
  <p>Your next adventure starts here</p>
</header>

<!-- HERO SLIDER -->
// Initialize Glide.js carousel for hero section //

<section data-aos="fade-up">
  <div class="glide">
    <div class="glide__track" data-glide-el="track">
      <ul class="glide__slides">
        <li class="glide__slide"><img src="images/beach.jpg" alt="Beach"></li>
        <li class="glide__slide"><img src="images/island.jpg" alt="Island"></li>
        <li class="glide__slide"><img src="images/resort.jpg" alt="Resort"></li>
      </ul>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2 data-aos="fade-right">Vacation Gallery</h2>
  <div class="gallery">
    <a href="images/tropical.jpg" data-lightbox="travel" data-aos="zoom-in">
      <img src="images/tropical.jpg" alt="Tropical">
    </a>
    <a href="images/ocean.jpg" data-lightbox="travel" data-aos="zoom-in">
      <img src="images/ocean.jpg" alt="Ocean">
    </a>
    <a href="images/sunset.jpg" data-lightbox="travel" data-aos="zoom-in">
      <img src="images/sunset.jpg" alt="Sunset">
    </a>
    <a href="images/mountain.jpg" data-lightbox="travel" data-aos="zoom-in">
      <img src="images/mountain.jpg" alt="Mountain">
    </a>
  </div>
</section>

<!-- CHART -->
<section data-aos="fade-left">
  <h2>Popular Destinations 2025</h2>
  <canvas id="travelChart"></canvas>
</section>

<!-- MAP -->
<section data-aos="fade-up">
  <h2>Explore on Map</h2>
  <div id="map"></div>
</section>

<footer>
  <p>© 2025 Escape Lagos Travel</p>
</footer>

<!-- JS Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/glide.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script>
  // Glide
  new Glide('.glide', {
    type: 'carousel',
    autoplay: 3000,
    hoverpause: true
  }).mount();

  // AOS
  AOS.init({
    duration: 1000,
    once: true
  });

  // Chart
  const ctx = document.getElementById('travelChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Bali', 'Maldives', 'Dubai', 'Santorini'],
      datasets: [{
        label: 'Bookings (%)',
        data: [35, 28, 22, 18],
        backgroundColor: [
          '#0d3b66',
          '#f4a261',
          '#2a9d8f',
          '#e76f51'
        ]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true,
          position: 'top'
        }
      },
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });

  // Leaflet Map
  const map = L.map('map').setView([6.5244, 3.3792], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  L.marker([6.5244, 3.3792])
    .addTo(map)
    .bindPopup('Lagos, Nigeria')
    .openPopup();
</script>

</body>
</html>
